# Tmux Plugin Manager
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

set -g @resurrect-dir '~/.local/share/tmux/resurrect'
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-processes '"~claude --resume" "~claude -r" "~claude -n->claude --resume *" "~claude"'

# Restore manually AFTER secrets are loaded: auto-restore would spawn claude/MCP processes at server start with no 1Password secrets in env.
set -g @continuum-restore 'off'

set -g @continuum-save-interval '1'

# Janitor (background, at server start): every save writes a new snapshot file and continuum saves once a minute, so prune snapshots older than ~7 days to bound growth.
# If pruning deleted the file the `last` symlink points to, drop the dangling link too so restore reports "no saved state" instead of failing.
run-shell -b 'resurrect_dir="${HOME}/.local/share/tmux/resurrect"; [ -d "${resurrect_dir}" ] || exit 0; find "${resurrect_dir}" -maxdepth 1 -type f -name "tmux_resurrect_*.txt" -mtime +6 -exec rm -f {} +; [ -L "${resurrect_dir}/last" ] && [ ! -e "${resurrect_dir}/last" ] && rm -f "${resurrect_dir}/last" || true'

# Save tmux state to tmux-resurrect on quit
set-hook -g client-detached 'run-shell -b "[ -z \"$(tmux list-clients 2>/dev/null)\" ] && \"$HOME/.tmux/plugins/tmux-resurrect/scripts/save.sh\" quiet"'

# Pane border styling
set -g pane-border-lines heavy
set -g pane-active-border-style 'fg=yellow'
set -g pane-border-style 'fg=colour240'

# Run vi mode
set-window-option -g mode-keys vi

# Enable mouse support if desired
set -g mouse on

# Give repeatable bindings enough time to be used comfortably after one prefix
set-option -g repeat-time 1000

# Set no gap for window index
set-option -g renumber-windows on

# Label window name to current directory
set-window-option -g window-status-current-format '#[fg=black,bg=yellow,bold] ▶ #{window_index} #[fg=black,bg=yellow]#{pane_current_command} #(echo "#{pane_current_path}" | rev | cut -d "/" -f-3 | rev) #[fg=black,bg=yellow]◀ #[default]'
set-window-option -g window-status-format         '#[fg=white,bold] #{window_index} #[fg=green]#{pane_current_command} #[fg=blue]#(echo "#{pane_current_path}" | rev | cut -d "/" -f-3 | rev) #[fg=white]|'

# Unbind all keys to use custom bind only used keys
unbind-key -a

# Use C-f, since it's on the home row and easier to hit than C-b
set-option -g prefix C-f
bind-key C-f send-prefix
set -g base-index 1

# Enable extended keys for better key handling in tmux 3.x
set -g extended-keys on

# Bind keys
bind x confirm kill-window
bind X confirm-before -p "kill-server? " "run-shell '~/.tmux/plugins/tmux-resurrect/scripts/save.sh quiet; tmux kill-server'"

bind-key c new-window

bind-key -r [ swap-pane -U
bind-key -r ] swap-pane -D

bind-key -nr C-S-Left  swap-window -d -t -1
bind-key -nr C-S-Right swap-window -d -t +1

bind-key v split-window -h -c "#{pane_current_path}"
bind-key s split-window -v -c "#{pane_current_path}"

bind-key p last-window

bind-key 0 select-window -t :0
bind-key 1 select-window -t :1
bind-key 2 select-window -t :2
bind-key 3 select-window -t :3
bind-key 4 select-window -t :4
bind-key 5 select-window -t :5
bind-key 6 select-window -t :6
bind-key 7 select-window -t :7
bind-key 8 select-window -t :8
bind-key 9 select-window -t :9

bind-key -r h select-pane -L
bind-key -r j select-pane -D
bind-key -r k select-pane -U
bind-key -r l select-pane -R

bind-key -r Down  resize-pane -D 5
bind-key -r Up    resize-pane -U 5
bind-key -r Left  resize-pane -L 5
bind-key -r Right resize-pane -R 5
bind-key -r Space next-layout
bind-key = select-layout -E

bind-key g copy-mode
bind-key b paste-buffer

# Adjust copy mode bindings for vi mode
bind-key -T copy-mode-vi v send-keys -X begin-selection
if-shell "uname | grep -q Darwin" "set -g @ksp-clipboard-command 'pbcopy'"
if-shell "uname | grep -q Linux"  "set -g @ksp-clipboard-command 'xclip -in -selection clipboard'"
if-shell "uname | grep -q Darwin" "bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel \'pbcopy\'"
if-shell "uname | grep -q Linux"  "bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel \'xclip -in -selection clipboard\'"
if-shell "uname | grep -q Darwin" "bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe \'pbcopy\'"
if-shell "uname | grep -q Linux"  "bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe \'xclip -in -selection clipboard\'"
bind-key -T root DoubleClick1Pane select-pane -t = \; if-shell -F "#{||:#{pane_in_mode},#{mouse_any_flag}}" "send-keys -M" "copy-mode -H \; send-keys -X select-word \; run-shell -d 0.3 \; send-keys -X copy-pipe \"#{@ksp-clipboard-command}\""
bind-key -T copy-mode-vi DoubleClick1Pane select-pane \; send-keys -X select-word \; run-shell -d 0.3 \; send-keys -X copy-pipe "#{@ksp-clipboard-command}"
bind-key -T root TripleClick1Pane select-pane -t = \; if-shell -F "#{||:#{pane_in_mode},#{mouse_any_flag}}" "send-keys -M" "copy-mode -H \; send-keys -X select-line \; run-shell -d 0.3 \; send-keys -X copy-pipe \"#{@ksp-clipboard-command}\""
bind-key -T copy-mode-vi TripleClick1Pane select-pane \; send-keys -X select-line \; run-shell -d 0.3 \; send-keys -X copy-pipe "#{@ksp-clipboard-command}"

# Initialize Tmux Plugin Manager
run '~/.tmux/plugins/tpm/tpm'
